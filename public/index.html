<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Authorized Security Test Dashboard</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Authorized Security Testing</p>
          <h1>Callback Dashboard</h1>
          <p class="lede">Monitor harmless PoC callbacks, verify reachability, and copy test URLs for approved assessments.</p>
        </div>
        <div class="status-card" aria-live="polite">
          <span id="statusDot" class="status-dot"></span>
          <div>
            <p class="status-label">Server status</p>
            <strong id="serverStatus">Checking...</strong>
          </div>
        </div>
      </section>

      <section class="panel grid">
        <div class="field">
          <label for="callbackUrl">Callback URL</label>
          <div class="copy-row">
            <input id="callbackUrl" readonly>
            <button type="button" class="copy-button" data-copy-target="callbackUrl">Copy</button>
          </div>
        </div>

        <div class="field">
          <label for="pocUrl">Hosted PoC JavaScript URL</label>
          <div class="copy-row">
            <input id="pocUrl" readonly>
            <button type="button" class="copy-button" data-copy-target="pocUrl">Copy</button>
          </div>
        </div>

        <div class="field span">
          <label for="scriptTag">HTML script tag</label>
          <div class="copy-row">
            <input id="scriptTag" readonly>
            <button type="button" class="copy-button" data-copy-target="scriptTag">Copy</button>
          </div>
        </div>
      </section>

      <section class="toolbar">
        <button type="button" id="sendTestRequest" class="primary">Send test request</button>
        <button type="button" id="clearLogs" class="secondary">Clear logs</button>
        <span id="lastUpdated" class="muted">Logs refresh every 5 seconds.</span>
      </section>

      <section class="panel">
        <div class="table-header">
          <h2>Recent Requests</h2>
          <span id="logCount" class="pill">0 logged</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Method</th>
                <th>Path</th>
                <th>IP</th>
                <th>User-Agent</th>
                <th>Referer</th>
              </tr>
            </thead>
            <tbody id="logsTable">
              <tr>
                <td colspan="6" class="empty">No requests logged yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
